name: Frontend Deployment Pipeline

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Notify Build Started
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🚀 *Build Started*
          
          📦 Repo: ${{ github.repository }}
          🌿 Branch: ${{ github.ref_name }}
          👤 Actor: ${{ github.actor }}"

      - name: 🚀 Notify Build Started (Discord)
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: '🚀 [FRONTEND] Build Started'
          description: |
            A new commit was pushed to ${{ github.ref_name }}. Starting build process...

            📦 **Repo**: ${{ github.repository }}
            👤 **Actor**: ${{ github.actor }}
          color: 0x3498db

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build
        env:
          VITE_JAVA_API_URL: ${{ secrets.VITE_JAVA_API_URL }}
          VITE_PYTHON_API_URL: ${{ secrets.VITE_PYTHON_API_URL }}
          VITE_CHAT_WS_URL: ${{ secrets.VITE_CHAT_WS_URL }}

      - name: ❌ Notify Build Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="❌ *Build Failed*
          
          📦 Repo: ${{ github.repository }}
          🌿 Branch: ${{ github.ref_name }}
          🔗 Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}"

      - name: ❌ Notify Build Failed (Discord)
        uses: sarisia/actions-status-discord@v1
        if: failure()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: '❌ [FRONTEND] Build Failed'
          description: |
            Application failed to compile. Deployment aborted.

            📦 **Repo**: ${{ github.repository }}
            🌿 **Branch**: ${{ github.ref_name }}
            🔗 **Commit**: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          color: 0xe74c3c

      - name: ✅ Notify Build Success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="✅ *Build Successful*
          
          📦 Repo: ${{ github.repository }}
          🌿 Branch: ${{ github.ref_name }}"

      - name: 📦 Notify Build Success (Discord)
        uses: sarisia/actions-status-discord@v1
        if: success()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: '📦 [FRONTEND] Build Successful'
          description: |
            Application compiled successfully. Proceeding to AWS deployment.

            📦 **Repo**: ${{ github.repository }}
            🌿 **Branch**: ${{ github.ref_name }}
          color: 0xf1c40f

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Notify Deploy Started
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="🚀 *Deployment Started*"

      - name: 🚀 Notify Deploy Started (Discord)
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: '🚀 [FRONTEND] Deployment Started'
          description: 'Starting deployment process to AWS...'
          color: 0x3498db

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME_DEV }}/ \
            --delete \
            --region us-east-1

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_DEV }} \
            --paths "/*"

      - name: ❌ Notify Deploy Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="❌ *Deployment Failed*"

      - name: ❌ Notify Deploy Failed (Discord)
        uses: sarisia/actions-status-discord@v1
        if: failure()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: '❌ [FRONTEND] Deployment Failed'
          description: 'The deployment process to AWS failed.'
          color: 0xe74c3c

      - name: ✅ Notify Deploy Success
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="✅ *Deployment Successful*
          
          🌍 Environment: DEV- https://d3f9p46i81h600.cloudfront.net"

      - name: ✅ Final Discord Notification
        uses: sarisia/actions-status-discord@v1
        if: success()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: success
          title: '[FRONTEND] Deployment Status'
          description: |
            The CI/CD pipeline has finished.
            
            🌍 **Environment**: DEV - https://d3f9p46i81h600.cloudfront.net
